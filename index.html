<html>
<head>
    <title>Turbo Co Website</title>
    <script>
        // Timer function
        function startTimer() {
            const timerElement = document.getElementById('timer');
            let time = 0;
            setInterval(() => {
                time++;
                timerElement.innerHTML = `Time: ${time} seconds`;
            }, 1000);
        }
    </script>
</head>
<body onload="startTimer()">
    <h1>Welcome to Turbo Co</h1>
    <div id="timer">Time: 0 seconds</div>
</body>
</html>
